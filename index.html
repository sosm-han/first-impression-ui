<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>첫인상 3단어</title>

<style>
body { font-family: sans-serif; padding:20px; background:#fafafa; }

h2 { margin-bottom:10px; }

input, textarea {
  padding:10px;
  width:100%;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #ddd;
}

.label {
  font-size:14px;
  margin-top:10px;
  margin-bottom:5px;
  color:#555;
}

.tabs {
  display:flex;
  gap:10px;
  margin-top:10px;
}

.tab {
  flex:1;
  padding:10px;
  text-align:center;
  border-radius:10px;
  background:#eee;
  cursor:pointer;
}

.tab.active {
  background:#ff6b9a;
  color:white;
}

.grid {
  display:grid;
  grid-template-columns: repeat(5,1fr);
  gap:8px;
  margin-top:20px;
}

.btn {
  padding:10px;
  border-radius:10px;
  background:#eee;
  text-align:center;
  cursor:pointer;
}

.btn.selected {
  background:#ff6b9a;
  color:white;
}

.selected-box {
  margin-top:20px;
  font-size:14px;
}

button {
  margin-top:20px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#ff6b9a;
  color:white;
  font-size:16px;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>첫인상 3단어</h2>

<div class="label">닉네임</div>
<input id="nickname" placeholder="닉네임 입력 (필수)" />

<div class="label">왜 그렇게 느꼈나요?</div>
<textarea id="memo" placeholder="예: 웃는 모습이 편안해서"></textarea>

<div class="tabs">
  <div class="tab active" id="femaleTab">여자 키워드</div>
  <div class="tab" id="maleTab">남자 키워드</div>
</div>

<div class="grid" id="grid"></div>

<div class="selected-box">
선택된 키워드: <span id="selected"></span>
</div>

<button id="submit">선택 완료</button>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbx2sdCk2rAGwhC_YrcqAX7UENy3XmVPMn2ptViEhaCJolHDLkYH2qeiWwNU9oPGlUKkMA/exec";

const femaleKeywords = [
"밝은","세련된","귀여운","차분한","매력적인",
"도도한","순수한","발랄한","따뜻한","센스 있는",
"분위기 있는","웃는 게 예쁜","부드러운","눈길 가는","자꾸 보게 되는",
"고급스러운","맑은 느낌","친근한","우아한","설레는",
"신비로운","통통 튀는","시크한","기억에 남는","편안한"
];

const maleKeywords = [
"듬직한","잘생긴","다정한","자신감 있는","유머 있는",
"차분한","센스 있는","남자다운","부드러운","똑똑한",
"편안한","믿음 가는","활발한","카리스마 있는","눈에 띄는",
"장난기 있는","깔끔한","든든한","노련한","순수한",
"재미있는","배려심 있는","남다른","설레는","계속 생각나는"
];

let currentGender = "female";
let selected = [];

const grid = document.getElementById("grid");

function renderKeywords() {
  grid.innerHTML = "";

  const list = currentGender === "female" ? femaleKeywords : maleKeywords;

  list.forEach(word => {
    const div = document.createElement("div");
    div.className = "btn";
    div.innerText = word;

    if (selected.includes(word)) {
      div.classList.add("selected");
    }

    div.onclick = () => {
      if (selected.includes(word)) {
        selected = selected.filter(w => w !== word);
      } else {
        if (selected.length >= 3) {
          alert("3개까지만 선택 가능");
          return;
        }
        selected.push(word);
      }

      renderKeywords();
      document.getElementById("selected").innerText = selected.join(", ");
    };

    grid.appendChild(div);
  });
}

document.getElementById("femaleTab").onclick = () => {
  currentGender = "female";
  selected = [];
  document.getElementById("femaleTab").classList.add("active");
  document.getElementById("maleTab").classList.remove("active");
  renderKeywords();
};

document.getElementById("maleTab").onclick = () => {
  currentGender = "male";
  selected = [];
  document.getElementById("maleTab").classList.add("active");
  document.getElementById("femaleTab").classList.remove("active");
  renderKeywords();
};

renderKeywords();

function submitData(data) {
  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify(data)
  }).catch(() => {});
}

document.getElementById("submit").onclick = () => {

  const nickname = document.getElementById("nickname").value;

  if (!nickname) {
    alert("닉네임 입력해주세요");
    return;
  }

  if (selected.length !== 3) {
    alert("키워드 3개 선택해주세요");
    return;
  }

  const data = {
    nickname,
    gender: currentGender,
    keywords: selected,
    memo: document.getElementById("memo").value
  };

  submitData(data);

  localStorage.setItem("result", JSON.stringify(data));

  window.location.href = "result.html";
};

</script>

</body>
</html>
