<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>첫인상 3단어 선택</title>
  <style>
    :root{
      --pink:#ff5f94;--pink-bg:#fff5f8;--blue:#4c86ff;--blue-bg:#f5f8ff;--text:#1f2937;--muted:#6b7280;--line:#e5e7eb;--card:#ffffff;--bg:#f8fbff;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;color:var(--text);background:linear-gradient(180deg,#fff 0%,#f8fbff 100%)}
    .wrap{max-width:760px;margin:0 auto;padding:20px 16px 40px}
    .hero{background:#fff;border:1px solid var(--line);border-radius:24px;padding:20px;box-shadow:0 10px 30px rgba(0,0,0,.04)}
    h1{margin:0 0 8px;font-size:28px}
    p{margin:0;color:var(--muted);line-height:1.5}
    .tabs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:18px 0 20px}
    .tab{border:none;border-radius:14px;padding:14px 16px;font-size:16px;font-weight:700;cursor:pointer;background:#f3f4f6;transition:.15s}
    .tab.active.female{background:var(--pink);color:#fff}
    .tab.active.male{background:var(--blue);color:#fff}
    .panel{margin-top:18px;background:#fff;border:1px solid var(--line);border-radius:24px;padding:18px}
    .hint{font-size:14px;color:var(--muted);margin-bottom:14px}
    .slots{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
    .slot{min-height:50px;border:1.5px dashed #d1d5db;border-radius:14px;display:flex;align-items:center;justify-content:center;background:#fafafa;font-weight:700}
    .slot.filled.female{border-style:solid;border-color:var(--pink);background:var(--pink-bg);color:var(--pink)}
    .slot.filled.male{border-style:solid;border-color:var(--blue);background:var(--blue-bg);color:var(--blue)}
    .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
    .chip{border:1px solid var(--line);background:#fff;border-radius:14px;padding:14px 8px;text-align:center;font-size:14px;font-weight:600;cursor:pointer;transition:.15s transform,.15s box-shadow,.15s border-color,.15s background,.15s opacity}
    .chip:hover{transform:translateY(-1px);box-shadow:0 6px 14px rgba(0,0,0,.06)}
    .chip.selected.female{border-color:var(--pink);background:var(--pink-bg);color:var(--pink)}
    .chip.selected.male{border-color:var(--blue);background:var(--blue-bg);color:var(--blue)}
    .chip.disabled{opacity:.45;cursor:not-allowed}
    textarea{width:100%;min-height:120px;margin-top:18px;border:1px solid var(--line);border-radius:16px;padding:14px;font:inherit;resize:vertical}
    .actions{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
    .btn{border:none;border-radius:14px;padding:14px 18px;font-size:15px;font-weight:800;cursor:pointer;transition:.15s opacity,.15s transform}
    .btn:hover{transform:translateY(-1px)}
    .btn:disabled{opacity:.6;cursor:wait;transform:none}
    .btn.primary.female{background:var(--pink);color:#fff}
    .btn.primary.male{background:var(--blue);color:#fff}
    .btn.ghost{background:#f3f4f6;color:#111827}
    .toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:#111827;color:#fff;padding:12px 16px;border-radius:999px;font-size:14px;opacity:0;pointer-events:none;transition:.2s;z-index:20}
    .toast.show{opacity:1}
    .loading{position:fixed;inset:0;background:rgba(17,24,39,.35);display:none;align-items:center;justify-content:center;z-index:30;padding:20px}
    .loading.show{display:flex}
    .loading-card{background:#fff;border-radius:22px;padding:24px 22px;min-width:260px;max-width:320px;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.15)}
    .spinner{width:38px;height:38px;margin:0 auto 14px;border-radius:50%;border:4px solid #e5e7eb;border-top-color:#111827;animation:spin .8s linear infinite}
    .loading-title{font-size:18px;font-weight:800;margin-bottom:6px}
    .loading-text{color:var(--muted);font-size:14px;line-height:1.5}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media (max-width:640px){.grid{grid-template-columns:repeat(3,1fr)}h1{font-size:24px}.wrap{padding:16px 12px 32px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>첫인상 3단어로 표현하기</h1>
      <p>서로의 첫 느낌을 3개 키워드로 골라보세요. 선택을 완료하면 결과 페이지로 이동하고, 입력한 내용은 Google Sheets에 저장됩니다.</p>
      <div class="tabs">
        <button class="tab active female" data-tab="female">여성 키워드</button>
        <button class="tab male" data-tab="male">남성 키워드</button>
      </div>
    </div>

    <div class="panel">
      <div class="hint">3개까지 선택 가능</div>
      <div class="slots" id="slots"></div>
      <div class="grid" id="grid"></div>
      <textarea id="memo" placeholder="메모를 남겨보세요. 예: 실제로 보니 생각보다 더 편안하고 장난기 있었음."></textarea>
      <div class="actions">
        <button class="btn primary female" id="submitBtn">선택 완료</button>
        <button class="btn ghost" id="resetBtn">다시 선택</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <div class="loading" id="loading">
    <div class="loading-card">
      <div class="spinner"></div>
      <div class="loading-title">기록 저장 중</div>
      <div class="loading-text">선택한 키워드와 메모를 저장하고 다음 페이지로 이동하고 있어요.</div>
    </div>
  </div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx2sdCk2rAGwhC_YrcqAX7UENy3XmVPMn2ptViEhaCJolHDLkYH2qeiWwNU9oPGlUKkMA/exec";

const KEYWORDS = {
  female:["밝은","세련된","귀여운","차분한","매력적인","도도한","순수한","발랄한","따뜻한","센스 있는","분위기 있는","웃는 게 예쁜","부드러운","눈길 가는","도도한 아우라","고급스러운","맑은 느낌","친근한","우아한","자꾸 보게 되는","신비로운","통통 튀는","시크한","설레는","기억에 남는"],
  male:["듬직한","잘생긴","다정한","자신감 있는","유머 있는","차분한","센스 있는","남자다운","부드러운","똑똑한","편안한","믿음 가는","활발한","카리스마 있는","눈에 띄는","장난기 있는","깔끔한","든든한","노련한","순수한","재미있는","배려심 있는","남다른","설레는","계속 생각나는"]
};

let state = JSON.parse(localStorage.getItem('currentSelection') || '{"tab":"female","keywords":[],"memo":""}');
if (!state.tab || !Array.isArray(state.keywords)) {
  state = { tab:'female', keywords:[], memo:'' };
}

const grid = document.getElementById('grid');
const slots = document.getElementById('slots');
const memo = document.getElementById('memo');
const toast = document.getElementById('toast');
const submitBtn = document.getElementById('submitBtn');
const loading = document.getElementById('loading');

function saveDraft(){
  localStorage.setItem('currentSelection', JSON.stringify({
    tab: state.tab,
    keywords: state.keywords,
    memo: memo.value || ''
  }));
}

function showToast(msg){
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'), 1800);
}

function syncButtons(){
  document.querySelectorAll('.tab').forEach(btn=>{
    const active = btn.dataset.tab === state.tab;
    btn.classList.toggle('active', active);
  });
  submitBtn.className = `btn primary ${state.tab}`;
}

function renderSlots(){
  slots.innerHTML = '';
  for(let i=0;i<3;i++){
    const value = state.keywords[i];
    const slot = document.createElement('div');
    slot.className = `slot ${value ? `filled ${state.tab}` : ''}`;
    slot.textContent = value || `선택 ${i+1}`;
    slots.appendChild(slot);
  }
}

function renderGrid(){
  syncButtons();
  renderSlots();
  grid.innerHTML = '';

  KEYWORDS[state.tab].forEach(word=>{
    const btn = document.createElement('button');
    const isSelected = state.keywords.includes(word);
    const disabled = !isSelected && state.keywords.length >= 3;
    btn.className = `chip ${isSelected ? `selected ${state.tab}` : ''} ${disabled ? 'disabled' : ''}`;
    btn.textContent = word;
    btn.disabled = disabled;
    btn.onclick = () => {
      if (state.keywords.includes(word)) {
        state.keywords = state.keywords.filter(v => v !== word);
      } else {
        if (state.keywords.length >= 3) {
          showToast('3개까지만 선택할 수 있어요');
          return;
        }
        state.keywords.push(word);
      }
      saveDraft();
      renderGrid();
    };
    grid.appendChild(btn);
  });
}

async function submitToGoogleSheets(record){
  const payload = {
    gender: record.genderTab,
    keywords: record.keywords,
    memo: record.memo,
    createdAt: record.createdAt,
    page: window.location.href
  };

  await fetch(SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: {
      'Content-Type': 'text/plain;charset=utf-8'
    },
    body: JSON.stringify(payload)
  });
}

function setLoading(isLoading){
  loading.classList.toggle('show', isLoading);
  submitBtn.disabled = isLoading;
  document.getElementById('resetBtn').disabled = isLoading;
}

document.querySelectorAll('.tab').forEach(btn => btn.onclick = () => {
  state = {
    tab: btn.dataset.tab,
    keywords: [],
    memo: memo.value || ''
  };
  saveDraft();
  renderGrid();
});

memo.value = state.memo || '';
memo.addEventListener('input', saveDraft);

document.getElementById('resetBtn').onclick = () => {
  state = { tab: state.tab, keywords: [], memo: '' };
  memo.value = '';
  saveDraft();
  renderGrid();
};

document.getElementById('submitBtn').onclick = async () => {
  if (state.keywords.length !== 3) {
    showToast('키워드 3개를 골라주세요');
    return;
  }

  const record = {
    id: Date.now(),
    genderTab: state.tab,
    keywords: [...state.keywords],
    memo: memo.value.trim(),
    createdAt: new Date().toLocaleString('ko-KR')
  };

  localStorage.setItem('latestResult', JSON.stringify(record));

  try {
    setLoading(true);
    await submitToGoogleSheets(record);
  } catch (error) {
    console.error(error);
    showToast('저장 중 문제가 생겼어요. 다시 시도해주세요.');
    setLoading(false);
    return;
  }

  localStorage.removeItem('currentSelection');
  location.href = 'result.html';
};

renderGrid();
</script>
</body>
</html>
