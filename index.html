<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>첫인상 3단어</title>

<style>
:root {
  --bg: #fff8fa;
  --card: #ffffff;
  --text: #222222;
  --muted: #888888;
  --line: #eeeeee;
  --primary: #ff6b9a;
  --primary-soft: #ffe3ec;
  --chip: #f5f5f5;
  --shadow: 0 8px 24px rgba(0,0,0,0.06);
  --radius-lg: 20px;
  --radius-md: 14px;
  --radius-sm: 12px;
}

* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Segoe UI", sans-serif;
  background: linear-gradient(180deg, #fff8fa 0%, #fffdfd 100%);
  color: var(--text);
  min-height: 100vh;
}

body.theme-female {
  --bg: #fff8fa;
  --primary: #ff6b9a;
  --primary-soft: #ffe3ec;
}

body.theme-male {
  --bg: #f4f8ff;
  --primary: #5b8def;
  --primary-soft: #e3edff;
}

.page {
  width: 100%;
  padding: 20px 16px 40px;
  background: linear-gradient(180deg, var(--bg) 0%, #ffffff 100%);
  min-height: 100vh;
}

.container {
  width: 100%;
  max-width: 760px;
  margin: 0 auto;
}

.hero {
  text-align: center;
  margin-bottom: 18px;
}

.title {
  margin: 0;
  font-size: 28px;
  line-height: 1.2;
  font-weight: 800;
  letter-spacing: -0.02em;
}

.subtitle {
  margin: 10px auto 0;
  max-width: 520px;
  font-size: 14px;
  line-height: 1.55;
  color: var(--muted);
  word-break: keep-all;
}

.card {
  background: var(--card);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow);
  padding: 18px;
  margin-bottom: 14px;
}

.label {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 8px;
  font-weight: 600;
}

.input,
.textarea {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: var(--radius-md);
  background: #fff;
  padding: 14px 14px;
  font-size: 15px;
  color: var(--text);
  outline: none;
  margin-bottom: 20px;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
}

.input::placeholder,
.textarea::placeholder {
  color: #b2b2b2;
}

.input:focus,
.textarea:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 4px color-mix(in srgb, var(--primary) 12%, transparent);
}

.textarea {
  min-height: 112px;
  resize: vertical;
  line-height: 1.5;
}

.tabs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 14px;
}

.tab {
  border: 0;
  border-radius: var(--radius-md);
  background: #f3f3f3;
  color: #666;
  padding: 13px 12px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.18s ease;
}

.tab.active {
  background: var(--primary);
  color: #fff;
  box-shadow: 0 8px 18px color-mix(in srgb, var(--primary) 24%, transparent);
}

.grid {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 8px;
}

.keyword-btn {
  border: 0;
  border-radius: var(--radius-sm);
  background: var(--chip);
  color: #444;
  min-height: 52px;
  padding: 10px 8px;
  font-size: 12px;
  font-weight: 700;
  line-height: 1.25;
  text-align: center;
  word-break: keep-all;
  cursor: pointer;
  transition: transform 0.12s ease, background-color 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
}

.keyword-btn:hover {
  transform: translateY(-1px);
}

.keyword-btn.selected {
  background: var(--primary);
  color: #fff;
  box-shadow: 0 8px 18px color-mix(in srgb, var(--primary) 20%, transparent);
}

.selection-wrap {
  margin-top: 14px;
  padding: 12px;
  border-radius: var(--radius-md);
  background: color-mix(in srgb, var(--primary) 8%, white);
}

.selection-title {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 8px;
  font-weight: 600;
}

.selected-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  min-height: 24px;
}

.selected-chip {
  display: inline-flex;
  align-items: center;
  padding: 8px 12px;
  border-radius: 999px;
  background: var(--primary-soft);
  color: var(--primary);
  font-size: 13px;
  font-weight: 700;
}

.submit {
  width: 100%;
  border: 0;
  border-radius: 16px;
  background: var(--primary);
  color: #fff;
  font-size: 16px;
  font-weight: 800;
  padding: 16px 18px;
  cursor: pointer;
  box-shadow: 0 10px 22px color-mix(in srgb, var(--primary) 24%, transparent);
  transition: transform 0.12s ease, opacity 0.18s ease;
}

.submit:hover {
  transform: translateY(-1px);
}

@media (max-width: 767px) {
  .page {
    padding: 18px 14px 32px;
  }

  .title {
    font-size: 24px;
  }

  .subtitle {
    font-size: 13px;
    margin-top: 8px;
  }

  .card {
    padding: 16px;
    border-radius: 18px;
  }

  .grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
  }

  .keyword-btn {
    min-height: 50px;
    font-size: 12px;
    padding: 10px 6px;
  }

  .submit {
    font-size: 15px;
    padding: 15px 16px;
  }
}

@media (min-width: 768px) {
  .page {
    padding: 40px 24px 56px;
  }

  .title {
    font-size: 34px;
  }

  .subtitle {
    font-size: 15px;
  }

  .card {
    padding: 22px;
  }

  .grid {
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 10px;
  }

  .keyword-btn {
    min-height: 60px;
    font-size: 13px;
    padding: 12px 10px;
  }
}

@media (min-width: 1100px) {
  .container {
    max-width: 860px;
  }

  .card {
    padding: 24px;
  }

  .grid {
    gap: 12px;
  }

  .keyword-btn {
    min-height: 64px;
    font-size: 14px;
  }
}
</style>
</head>

<body class="theme-female">
  <div class="page">
    <div class="container">

      <div class="hero">
        <h1 class="title">첫인상 3단어</h1>
        <p class="subtitle">
          상대에게 느껴진 매력을 3가지로 표현해보세요.<br>
          그리고 상대방이 느낀 내 첫 인상도 유추해보세요.
        </p>
      </div>

      <div class="card">
        <div class="label">닉네임</div>
        <input id="nickname" class="input" placeholder="닉네임 입력" />

        <div class="label">왜 그렇게 느꼈나요?</div>
        <textarea id="memo" class="textarea" placeholder="느낌을 자유롭게 적어보세요"></textarea>
      </div>

      <div class="card">
        <div class="tabs">
          <button class="tab active" id="femaleTab" type="button">여자</button>
          <button class="tab" id="maleTab" type="button">남자</button>
        </div>

        <div class="grid" id="grid"></div>

        <div class="selection-wrap">
          <div class="selection-title">선택된 키워드</div>
          <div class="selected-chips" id="selectedChips"></div>
        </div>
      </div>

      <button class="submit" id="submit" type="button">선택 완료</button>

    </div>
  </div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbx5Z6ElZTSjksyr6k2zEAAm0p3QShnEg_Bwu13k61BJbTMPQApAmGWBjM5bJ2B_gI66mA/exec";

const femaleKeywords = [
  "밝은","세련된","귀여운","차분한","매력적인",
  "도도한","순수한","발랄한","따뜻한","센스 있는",
  "분위기 있는","웃는 게 예쁜","부드러운","눈길 가는","자꾸 보게 되는",
  "고급스러운","맑은 느낌","친근한","우아한","설레는",
  "신비로운","통통 튀는","시크한","기억에 남는","편안한"
];

const maleKeywords = [
  "듬직한","잘생긴","다정한","자신감 있는","유머 있는",
  "차분한","센스 있는","남자다운","부드러운","똑똑한",
  "편안한","믿음 가는","활발한","카리스마 있는","눈에 띄는",
  "장난기 있는","깔끔한","든든한","노련한","순수한",
  "재미있는","배려심 있는","남다른","설레는","계속 생각나는"
];

let currentGender = "female";
let selected = [];

const bodyEl = document.body;
const grid = document.getElementById("grid");
const selectedChips = document.getElementById("selectedChips");
const femaleTab = document.getElementById("femaleTab");
const maleTab = document.getElementById("maleTab");
const submitBtn = document.getElementById("submit");

function applyTheme(gender) {
  bodyEl.classList.remove("theme-female", "theme-male");
  bodyEl.classList.add(gender === "female" ? "theme-female" : "theme-male");
}

function getCurrentKeywords() {
  return currentGender === "female" ? femaleKeywords : maleKeywords;
}

function renderSelectedChips() {
  selectedChips.innerHTML = "";
  selected.forEach(word => {
    const chip = document.createElement("span");
    chip.className = "selected-chip";
    chip.textContent = word;
    selectedChips.appendChild(chip);
  });
}

function renderKeywords() {
  grid.innerHTML = "";

  getCurrentKeywords().forEach(word => {
    const button = document.createElement("button");
    button.type = "button";
    button.className = "keyword-btn";
    button.textContent = word;

    if (selected.includes(word)) {
      button.classList.add("selected");
    }

    button.addEventListener("click", () => {
      if (selected.includes(word)) {
        selected = selected.filter(item => item !== word);
      } else {
        if (selected.length >= 3) {
          alert("3개까지만 선택 가능");
          return;
        }
        selected.push(word);
      }

      renderKeywords();
      renderSelectedChips();
    });

    grid.appendChild(button);
  });
}

function setGenderTab(gender) {
  currentGender = gender;
  selected = [];

  femaleTab.classList.toggle("active", gender === "female");
  maleTab.classList.toggle("active", gender === "male");

  applyTheme(gender);
  renderKeywords();
  renderSelectedChips();
}

femaleTab.addEventListener("click", () => setGenderTab("female"));
maleTab.addEventListener("click", () => setGenderTab("male"));

function submitData(data) {
  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify(data)
  }).catch(() => {});
}

function getDeviceInfo() {
  const ua = navigator.userAgent;

  let device = /Mobi|Android/i.test(ua) ? "mobile" : "desktop";
  let os = "unknown";

  if (/Android/i.test(ua)) os = "Android";
  else if (/iPhone|iPad|iPod/i.test(ua)) os = "iOS";
  else if (/Win/i.test(ua)) os = "Windows";
  else if (/Mac/i.test(ua)) os = "Mac";

  return {
    device,
    os,
    userAgent: ua,
    screen: `${window.innerWidth}x${window.innerHeight}`,
    language: navigator.language
  };
}
  
submitBtn.addEventListener("click", () => {
  const nickname = document.getElementById("nickname").value.trim();
  const memo = document.getElementById("memo").value.trim();

  if (!nickname) {
    alert("닉네임 입력해주세요");
    return;
  }

  if (selected.length !== 3) {
    alert("키워드 3개 선택해주세요");
    return;
  }

  const deviceInfo = getDeviceInfo();

  const data = {
  nickname,
  gender: currentGender,
  keywords: selected,
  memo,
  device: deviceInfo.device,
  os: deviceInfo.os,
  screen: deviceInfo.screen,
  language: deviceInfo.language,
  userAgent: deviceInfo.userAgent
};
  
  submitData(data);
  localStorage.setItem("result", JSON.stringify(data));
  window.location.href = "result.html";
});

applyTheme(currentGender);
renderKeywords();
renderSelectedChips();
</script>
</body>
</html>
