<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>첫인상 3단어</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
    margin: 0;
    padding: 24px 16px 40px;
    background: linear-gradient(180deg, #fff7fb 0%, #fafafa 100%);
    color: #222;
  }
  .wrap {
    max-width: 760px;
    margin: 0 auto;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.06);
  }
  h1 {
    font-size: 28px;
    margin: 0 0 8px;
  }
  .sub {
    margin: 0 0 20px;
    color: #666;
    line-height: 1.5;
    font-size: 15px;
  }
  label {
    display: block;
    font-size: 14px;
    font-weight: 700;
    margin: 0 0 8px;
  }
  input, textarea {
    width: 100%;
    border: 1px solid #e4e4e7;
    border-radius: 14px;
    padding: 14px 16px;
    font-size: 15px;
    outline: none;
    transition: border-color .15s ease, box-shadow .15s ease;
    background: #fff;
  }
  input:focus, textarea:focus {
    border-color: #ff6b9a;
    box-shadow: 0 0 0 4px rgba(255,107,154,0.12);
  }
  textarea {
    min-height: 110px;
    resize: vertical;
  }
  .field { margin-bottom: 18px; }
  .selected-wrap {
    margin: 20px 0 16px;
    padding: 16px;
    background: #fff3f8;
    border-radius: 16px;
    border: 1px solid #ffd3e2;
  }
  .selected-title {
    font-size: 13px;
    color: #9a4f69;
    margin-bottom: 10px;
    font-weight: 700;
  }
  .selected-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    min-height: 36px;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 9px 12px;
    border-radius: 999px;
    background: #ff6b9a;
    color: white;
    font-size: 14px;
    font-weight: 700;
  }
  .chip.empty {
    background: #fff;
    color: #b6b6bd;
    border: 1px dashed #d9d9df;
    min-width: 72px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 10px;
    margin-top: 6px;
  }
  .keyword-btn {
    border: 1px solid #ececf1;
    background: #f7f7fa;
    color: #333;
    border-radius: 14px;
    padding: 14px 8px;
    text-align: center;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: transform .12s ease, background .12s ease, border-color .12s ease, color .12s ease, box-shadow .12s ease;
    user-select: none;
    min-height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1.3;
  }
  .keyword-btn:hover { transform: translateY(-1px); }
  .keyword-btn.selected {
    background: #ff6b9a;
    color: #fff;
    border-color: #ff6b9a;
    box-shadow: 0 8px 18px rgba(255,107,154,0.24);
  }
  .actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }
  .primary, .secondary {
    flex: 1;
    border: 0;
    border-radius: 14px;
    padding: 15px 16px;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
  }
  .primary {
    background: #ff6b9a;
    color: #fff;
  }
  .secondary {
    background: #f3f4f6;
    color: #333;
  }
  .hint {
    font-size: 13px;
    color: #767676;
    margin-top: 10px;
  }
  @media (max-width: 640px) {
    body { padding: 18px 12px 32px; }
    .card { padding: 16px; border-radius: 18px; }
    h1 { font-size: 24px; }
    .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>첫인상 3단어</h1>
      <p class="sub">상대를 떠올리며 가장 잘 어울리는 키워드 3개를 골라보세요. 닉네임과 메모는 Google Sheets로 함께 저장됩니다.</p>

      <div class="field">
        <label for="nickname">닉네임</label>
        <input id="nickname" type="text" placeholder="닉네임 입력 (필수)" />
      </div>

      <div class="field">
        <label for="memo">메모</label>
        <textarea id="memo" placeholder="메모를 남겨보세요 (선택)"></textarea>
      </div>

      <div class="selected-wrap">
        <div class="selected-title">선택된 키워드 3개</div>
        <div class="selected-list" id="selectedList">
          <span class="chip empty">1</span>
          <span class="chip empty">2</span>
          <span class="chip empty">3</span>
        </div>
      </div>

      <div class="grid" id="grid"></div>

      <div class="actions">
        <button class="secondary" id="resetBtn" type="button">초기화</button>
        <button class="primary" id="submitBtn" type="button">선택 완료</button>
      </div>
      <div class="hint">키워드는 최대 3개까지 선택할 수 있어요.</div>
    </div>
  </div>

<script>
  const scriptURL = "https://script.google.com/macros/s/AKfycbx2sdCk2rAGwhC_YrcqAX7UENy3XmVPMn2ptViEhaCJolHDLkYH2qeiWwNU9oPGlUKkMA/exec";

  const keywords = [
    "밝은","세련된","귀여운","차분한","매력적인",
    "도도한","순수한","발랄한","따뜻한","센스 있는",
    "분위기 있는","웃는 게 예쁜","부드러운","눈길 가는","자꾸 보게 되는",
    "고급스러운","맑은 느낌","친근한","우아한","설레는",
    "신비로운","통통 튀는","시크한","기억에 남는","편안한"
  ];

  const grid = document.getElementById('grid');
  const selectedList = document.getElementById('selectedList');
  const submitBtn = document.getElementById('submitBtn');
  const resetBtn = document.getElementById('resetBtn');
  let selected = [];

  function renderSelected() {
    selectedList.innerHTML = '';
    for (let i = 0; i < 3; i++) {
      const span = document.createElement('span');
      if (selected[i]) {
        span.className = 'chip';
        span.textContent = selected[i];
      } else {
        span.className = 'chip empty';
        span.textContent = String(i + 1);
      }
      selectedList.appendChild(span);
    }
  }

  function renderGrid() {
    grid.innerHTML = '';
    keywords.forEach((word) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'keyword-btn' + (selected.includes(word) ? ' selected' : '');
      btn.textContent = word;
      btn.addEventListener('click', () => {
        if (selected.includes(word)) {
          selected = selected.filter(item => item !== word);
        } else {
          if (selected.length >= 3) {
            alert('키워드는 3개까지만 선택할 수 있어요.');
            return;
          }
          selected.push(word);
        }
        renderSelected();
        renderGrid();
      });
      grid.appendChild(btn);
    });
  }

  function submitData(data) {
    fetch(scriptURL, {
      method: 'POST',
      body: JSON.stringify(data),
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      mode: 'no-cors'
    }).catch(() => {});
  }

  resetBtn.addEventListener('click', () => {
    selected = [];
    document.getElementById('nickname').value = '';
    document.getElementById('memo').value = '';
    renderSelected();
    renderGrid();
  });

  submitBtn.addEventListener('click', () => {
    const nickname = document.getElementById('nickname').value.trim();
    const memo = document.getElementById('memo').value.trim();

    if (!nickname) {
      alert('닉네임을 입력해주세요.');
      return;
    }

    if (selected.length !== 3) {
      alert('키워드 3개를 선택해주세요.');
      return;
    }

    const data = {
      nickname,
      gender: 'female',
      keywords: selected,
      memo
    };

    localStorage.setItem('result', JSON.stringify(data));
    submitData(data);
    window.location.href = 'result.html';
  });

  renderSelected();
  renderGrid();
</script>
</body>
</html>
