<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>선택 결과</title>
  <style>
    :root{--pink:#ff5f94;--blue:#4c86ff;--text:#111827;--muted:#6b7280;--line:#e5e7eb}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;background:#f9fafb;color:var(--text)}
    .wrap{max-width:760px;margin:0 auto;padding:24px 16px 48px}
    .card{background:#fff;border:1px solid var(--line);border-radius:24px;padding:24px;box-shadow:0 10px 30px rgba(0,0,0,.04)}
    h1{margin:0 0 10px;font-size:28px}
    .sub{color:var(--muted);margin-bottom:18px}
    .chips{display:flex;gap:10px;flex-wrap:wrap;margin:16px 0 22px}
    .chip{padding:12px 16px;border-radius:999px;font-weight:800}
    .female{background:#fff0f5;color:var(--pink);border:1px solid #ffc2d6}
    .male{background:#eef4ff;color:var(--blue);border:1px solid #c7d8ff}
    .box{background:#f9fafb;border:1px solid var(--line);border-radius:18px;padding:16px;margin-top:12px}
    .questions button,.actions button{border:none;border-radius:14px;padding:13px 16px;font-size:15px;font-weight:800;cursor:pointer}
    .questions{display:grid;gap:10px;margin-top:16px}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:22px}
    .primary{background:#111827;color:#fff}
    .ghost{background:#f3f4f6}
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>선택 결과</h1>
    <div class="sub">방금 저장한 키워드와 메모예요.</div>
    <div id="meta"></div>
    <div class="chips" id="chips"></div>
    <div class="box"><strong>메모</strong><div id="memo" style="margin-top:8px;color:#374151;line-height:1.6"></div></div>
    <div class="box">
      <strong>대화 질문 추천</strong>
      <div class="questions" id="questions"></div>
    </div>
    <div class="actions">
      <button class="primary" onclick="location.href='index.html'">다시 선택하기</button>
    </div>
  </div>
</div>
<script>
const data = JSON.parse(localStorage.getItem('latestResult') || 'null');
if(!data){ location.href='index.html'; }
const cls = data.genderTab === 'female' ? 'female' : 'male';
document.getElementById('meta').innerHTML = `<div style="color:#6b7280">저장 시각: ${data.createdAt}</div>`;
document.getElementById('chips').innerHTML = data.keywords.map(k=>`<span class="chip ${cls}">${k}</span>`).join('');
document.getElementById('memo').textContent = data.memo || '메모 없음';
const questions = [
  `왜 ${data.keywords[0]}이라는 단어를 골랐어?`,
  `${data.keywords[1]}이라고 느낀 순간이 있었어?`,
  `처음 느낌이랑 지금 느낌이 가장 달라진 키워드는 뭐야?`
];
document.getElementById('questions').innerHTML = questions.map(q=>`<button onclick="navigator.clipboard.writeText('${q.replace(/'/g,"\\'")}');this.textContent='복사됨';setTimeout(()=>this.textContent='${q.replace(/'/g,"\\'")}',1000)">${q}</button>`).join('');
</script>
</body>
</html>
